server {
    listen 80;
    server_name localhost;

    # Firmware install — long-running, needs extended timeout
    location /api/firmware/install {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:7778/api/firmware/install;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Brainstorm Control Panel at root
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:7778/;
        proxy_http_version 1.1;
        include /etc/nginx/mime.types;
    }

    # strfry relay at /relay (HTTP landing page + WebSocket upgrade)
    location /relay {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:7777/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Neo4j Browser
    location /neo4j/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:7474/;
        proxy_http_version 1.1;
    }

    # Neo4j Browser assets (needs direct proxy for relative paths)
    location /browser/ {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_pass http://127.0.0.1:7474/browser/;
        proxy_http_version 1.1;
    }

    # Neo4j Bolt WebSocket proxy
    location /bolt {
        proxy_pass http://127.0.0.1:7687;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
